<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosa Cloud Retro Phone</title>
    
    <!-- CLOUD MOSA AUDIO PATCH: Chunk WebAudio to WebM Blobs -->
    <script>
        (function() {
            const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
            if (!OriginalAudioContext) return;

            function PatchedAudioContext(options) {
                const ctx = new OriginalAudioContext(options);
                
                // 1. Capture emulator audio output
                const streamDest = ctx.createMediaStreamDestination();
                Object.defineProperty(ctx, 'destination', { value: streamDest, writable: false });

                // 2. Setup a standard HTML Audio element (natively proxies on Cloud Phones)
                const audioEl = document.createElement('audio');
                audioEl.style.display = 'none';
                document.body.appendChild(audioEl);

                // 3. Record the stream to WebM Blobs
                const mimeType = 'audio/webm';
                const recorder = new MediaRecorder(streamDest.stream, { mimeType });
                
                // 4. Sequential Blob Playback Queue
                const queue = [];
                let isPlaying = false;

                function playNextBlob() {
                    if (isPlaying || queue.length === 0) return;
                    isPlaying = true;
                    const blobUrl = queue.shift();
                    
                    audioEl.src = blobUrl;
                    audioEl.play().catch(() => { isPlaying = false; });
                    
                    audioEl.onended = () => {
                        URL.revokeObjectURL(blobUrl); // Prevent memory leaks
                        isPlaying = false;
                        playNextBlob();
                    };
                }

                recorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) {
                        queue.push(URL.createObjectURL(e.data));
                        playNextBlob();
                    }
                };

                // Emit audio blobs every 500ms
                recorder.start(500);

                // Force unlock audio on first interaction
                const unlockAudio = () => {
                    if (audioEl.paused) audioEl.play().catch(()=>{});
                };
                window.addEventListener('keydown', unlockAudio, {once: true});
                window.addEventListener('touchstart', unlockAudio, {once: true});

                return ctx;
            }
            PatchedAudioContext.prototype = OriginalAudioContext.prototype;
            window.AudioContext = PatchedAudioContext;
            window.webkitAudioContext = PatchedAudioContext;
        })();
    </script>

    <script src="https://unpkg.com/nostalgist/dist/nostalgist.umd.js"></script>
    <script src="https://unpkg.com/localforage/dist/localforage.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --hl-color: #0078D7;
            --text-color: #FFFFFF;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; background: #000;
            color: var(--text-color); font-family: sans-serif; overflow: hidden;
            user-select: none;
            display: flex; justify-content: center; align-items: center;
        }
        
        /* HARDCODED RESOLUTION: Force 240x320 container */
        #app {
            display: flex; flex-direction: column; 
            width: 240px; height: 320px; 
            position: relative; background: var(--bg-color); overflow: hidden;
        }
        .header {
            background: var(--hl-color); padding: 6px; text-align: center;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            flex-shrink: 0;
        }
        .content {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .section-title {
            font-size: 11px; color: #888; text-transform: uppercase;
            margin: 10px 0 4px 0; font-weight: bold; text-align: center;
            border-bottom: 1px solid #333; padding-bottom: 4px;
        }
        .nav-item {
            display: block; width: 100%; padding: 10px; box-sizing: border-box;
            background: #222; border: 2px solid transparent; border-radius: 4px;
            margin-bottom: 6px; text-align: left; font-size: 14px; color: #fff;
        }
        .nav-item.focused {
            border-color: #00FF00; background: #333; outline: none;
        }
        .soft-keys {
            display: flex; justify-content: space-between; background: #111;
            padding: 4px 8px; font-size: 12px; font-weight: bold; color: #aaa;
            border-top: 1px solid #333; flex-shrink: 0;
        }
        
        /* FULLSCREEN CANVAS STRETCH */
        #view-game {
            width: 240px; height: 320px; margin: 0; padding: 0;
            background: #000;
        }
        #game-container {
            width: 240px !important;
            height: 320px !important;
            max-width: 240px !important;
            max-height: 320px !important;
            object-fit: fill !important; /* Forces stretch ignoring original aspect ratio */
            image-rendering: pixelated;
            display: block;
        }
        
        .hidden { display: none !important; }
        .danger { color: #ff5555; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header" id="app-header">Retro Mosa</div>
        
        <div id="view-home" class="content view">
            <div class="nav-item" id="btn-upload">📥 Upload Personal ROM</div>
            <input type="file" id="file-input" class="hidden" accept=".nes,.gba,.gb,.gbc,.sfc,.smc,.md,.bin">
            <div class="nav-item" id="btn-settings">⚙️ Settings (Map Keys)</div>
            
            <div id="rom-list"></div>
        </div>

        <div id="view-settings" class="content view hidden">
            <div style="font-size: 12px; margin-bottom: 10px; color: #ccc;">
                Press ENTER on an action, then press the physical key you want to assign to it.
            </div>
            <div id="key-list"></div>
            <div class="nav-item danger" id="btn-clear-db">🗑️ Delete Uploaded Games</div>
        </div>

        <!-- Game viewport directly houses the canvas -->
        <div id="view-game" class="view hidden">
            <canvas id="game-container"></canvas>
        </div>

        <div class="soft-keys" id="soft-keys">
            <span id="lsk-label">Select</span>
            <span id="rsk-label">Menu</span>
        </div>
    </div>

    <script>
        const PRELOADED_ROMS = [
            'https://cdn.jsdelivr.net/gh/cldapps/emulator@main/roms/Pokemon%20-%20FireRed%20Version%20(USA,%20Europe)%20(Rev%201).gba',
            'https://cdn.jsdelivr.net/gh/cldapps/emulator@main/roms/The%20Legend%20of%20Zelda%20-%20New%20Awakening%20(hack).gbc'
        ];

        // Standard PC Keys expected natively by Emscripten/RetroArch
        const RA_KEYS = {
            a: 'z', b: 'x', x: 's', y: 'a',
            start: 'Enter', select: 'Shift',
            up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight'
        };

        let currentView = 'home';
        let focusIndex = 0;
        let isMapping = false;
        let mappingKeyTarget = null;
        let emulatorInstance = null;
        let userRoms = []; 

        let keyMap = JSON.parse(localStorage.getItem('mosa_keymap')) || {
            a: '3', b: '1', x: '9', y: '7',
            start: '#', select: '*',
            up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
            quit: 'SoftRight' 
        };

        const views = {
            home: document.getElementById('view-home'),
            settings: document.getElementById('view-settings'),
            game: document.getElementById('view-game')
        };
        const lskLabel = document.getElementById('lsk-label');
        const rskLabel = document.getElementById('rsk-label');
        const appHeader = document.getElementById('app-header');
        const softKeys = document.getElementById('soft-keys');

        async function init() {
            await loadRomsFromDB();
            renderRomList();
            renderSettingsList();
            updateFocus();
        }

        async function loadRomsFromDB() {
            userRoms = [];
            await localforage.iterate((value, key) => {
                if (key.startsWith('rom_')) userRoms.push(value);
            });
        }

        function getEmulatorCore(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const cores = {
                'nes': 'fceumm', 'gba': 'mgba', 'gb': 'gambatte', 'gbc': 'gambatte',
                'sfc': 'snes9x', 'smc': 'snes9x', 'md': 'genesis_plus_gx', 'bin': 'genesis_plus_gx'
            };
            return cores[ext] || 'fceumm';
        }

        function switchView(viewName) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
            views[viewName].style.display = 'block';
            
            currentView = viewName;
            focusIndex = 0;

            if (viewName === 'home') {
                appHeader.style.display = 'block';
                softKeys.style.display = 'flex';
                appHeader.innerText = "Retro Mosa";
                lskLabel.innerText = "Select";
                rskLabel.innerText = "Menu";
                renderRomList();
            } else if (viewName === 'settings') {
                appHeader.style.display = 'block';
                softKeys.style.display = 'flex';
                appHeader.innerText = "Key Mapper";
                lskLabel.innerText = "Map";
                rskLabel.innerText = "Back";
            } else if (viewName === 'game') {
                // Completely hide header and soft-keys for full 240x320 stretch
                appHeader.style.display = 'none';
                softKeys.style.display = 'none';
            }
            updateFocus();
        }

        function getNavItems() {
            return views[currentView].querySelectorAll('.nav-item');
        }

        function updateFocus() {
            const items = getNavItems();
            items.forEach((el, i) => {
                if (i === focusIndex) {
                    el.classList.add('focused');
                    el.scrollIntoView({ block: 'nearest' });
                } else {
                    el.classList.remove('focused');
                }
            });
        }

        // --- KEYMAP PROXY HANDLER ---
        // Catches physical cloud-phone keys and translates them to standard PC keyboard
        // events so Emscripten/RetroArch natively detects them.
        function handleEmulatorInput(e, isDown) {
            if (currentView !== 'game' || e.isProxied) return;

            // Handle quitting the emulator safely
            if (isDown && (e.key === keyMap.quit || e.key === 'Backspace' || e.key === 'SoftRight')) {
                e.preventDefault();
                if (emulatorInstance) {
                    emulatorInstance.exit().catch(()=>{});
                    window.location.reload(); 
                }
                return;
            }

            for (const [action, boundKey] of Object.entries(keyMap)) {
                if (e.key === boundKey && RA_KEYS[action]) {
                    e.preventDefault();
                    e.stopImmediatePropagation(); // Block original physical key
                    
                    const stdKey = RA_KEYS[action];
                    const fakeEvent = new KeyboardEvent(isDown ? 'keydown' : 'keyup', {
                        key: stdKey,
                        code: stdKey.length > 1 ? stdKey : 'Key' + stdKey.toUpperCase(),
                        keyCode: stdKey.length === 1 ? stdKey.toUpperCase().charCodeAt(0) : 0,
                        bubbles: true, cancelable: true
                    });
                    fakeEvent.isProxied = true;
                    
                    const canvas = document.getElementById('game-container');
                    if (canvas) canvas.dispatchEvent(fakeEvent);
                    return;
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            // Mapping Logic
            if (isMapping && currentView === 'settings') {
                e.preventDefault();
                keyMap[mappingKeyTarget] = e.key;
                localStorage.setItem('mosa_keymap', JSON.stringify(keyMap));
                isMapping = false;
                renderSettingsList();
                return;
            }

            // Gameplay input
            if (currentView === 'game') {
                handleEmulatorInput(e, true);
                return;
            }

            // UI Navigation
            const items = getNavItems();
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                focusIndex = (focusIndex + 1) % items.length;
                updateFocus();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                focusIndex = (focusIndex - 1 + items.length) % items.length;
                updateFocus();
            } else if (e.key === 'Enter' || e.key === 'SoftLeft') {
                e.preventDefault();
                if (items[focusIndex]) items[focusIndex].click();
            } else if (e.key === 'SoftRight' || e.key === 'Backspace') {
                e.preventDefault();
                if (currentView === 'settings') switchView('home');
            }
        }, true); // Use capture phase to intercept before Emscripten

        window.addEventListener('keyup', (e) => {
            if (currentView === 'game') handleEmulatorInput(e, false);
        }, true);

        // --- UI RENDERING ---
        function renderRomList() {
            const list = document.getElementById('rom-list');
            list.innerHTML = '';

            if (PRELOADED_ROMS.length > 0) {
                const titlePre = document.createElement('div');
                titlePre.className = 'section-title';
                titlePre.innerText = 'Built-in Games';
                list.appendChild(titlePre);

                PRELOADED_ROMS.forEach(romPath => {
                    const rawFileName = romPath.split('/').pop();
                    const cleanFileName = decodeURIComponent(rawFileName);
                    
                    const div = document.createElement('div');
                    div.className = 'nav-item';
                    div.innerHTML = `☁️ ${cleanFileName}`;
                    div.onclick = () => launchGame(romPath, true);
                    list.appendChild(div);
                });
            }

            if (userRoms.length > 0) {
                const titleUser = document.createElement('div');
                titleUser.className = 'section-title';
                titleUser.innerText = 'My Uploads';
                list.appendChild(titleUser);

                userRoms.forEach(rom => {
                    const div = document.createElement('div');
                    div.className = 'nav-item';
                    div.innerHTML = `💾 ${rom.name}`;
                    div.onclick = () => launchGame(rom.id, false); 
                    list.appendChild(div);
                    
                    const delDiv = document.createElement('div');
                    delDiv.className = 'nav-item danger';
                    delDiv.innerHTML = `❌ Delete ${rom.name.substring(0,10)}...`;
                    delDiv.onclick = async () => {
                        await localforage.removeItem('rom_' + rom.id);
                        await loadRomsFromDB();
                        renderRomList();
                        updateFocus();
                    };
                    list.appendChild(delDiv);
                });
            }
            updateFocus();
        }

        function renderSettingsList() {
            const list = document.getElementById('key-list');
            list.innerHTML = '';
            const mapOrder = ['a', 'b', 'x', 'y', 'start', 'select', 'up', 'down', 'left', 'right', 'quit'];
            
            mapOrder.forEach(key => {
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.innerHTML = isMapping && mappingKeyTarget === key 
                    ? `Mapping [${key.toUpperCase()}]... Press a key!`
                    : `Map ${key.toUpperCase()} (Current: <b>${keyMap[key]}</b>)`;
                
                div.onclick = () => {
                    isMapping = true;
                    mappingKeyTarget = key;
                    renderSettingsList();
                };
                list.appendChild(div);
            });
            updateFocus();
        }

        document.getElementById('btn-upload').onclick = () => { document.getElementById('file-input').click(); };
        document.getElementById('btn-settings').onclick = () => { switchView('settings'); };
        document.getElementById('btn-clear-db').onclick = async () => {
            await localforage.clear();
            userRoms = [];
            switchView('home');
        };

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            appHeader.innerText = "Saving ROM...";
            try {
                const buffer = await file.arrayBuffer();
                const blob = new Blob([buffer]);
                const romId = Date.now();
                
                await localforage.setItem('rom_' + romId, { id: romId, name: file.name, blob: blob });
                await loadRomsFromDB();
                renderRomList();
                appHeader.innerText = "Retro Mosa";
            } catch (err) {
                alert("Storage error: " + err.message);
                appHeader.innerText = "Retro Mosa";
            }
        });

        // --- LAUNCH GAME ---
        async function launchGame(identifier, isPreloaded) {
            switchView('game');

            try {
                let romSource;
                let fileName;

                if (isPreloaded) {
                    romSource = identifier;
                    fileName = decodeURIComponent(identifier.split('/').pop());
                } else {
                    const romData = await localforage.getItem('rom_' + identifier);
                    if (!romData) throw new Error("ROM not found in DB.");
                    const fileData = romData.blob || romData.buffer; 
                    romSource = new File([fileData], romData.name);
                    fileName = romData.name;
                }

                const coreName = getEmulatorCore(fileName);

                // Note: We no longer pass custom keys into retroarchConfig. 
                // The Proxy Handler maps your keys directly into standard inputs!
                emulatorInstance = await Nostalgist.launch({
                    core: coreName,
                    rom: romSource, 
                    element: document.getElementById('game-container')
                });
            } catch (err) {
                alert("Failed to load! " + err.message);
                switchView('home');
            }
        }

        init();
    </script>
</body>
</html>
